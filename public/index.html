<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gamble Sands 2025</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green:   #2d6a4f;
    --green2:  #40916c;
    --gold:    #d4a843;
    --cream:   #f5f0e8;
    --dark:    #1a1a1a;
    --mid:     #3a3a3a;
    --light:   #888;
    --card:    #ffffff;
    --border:  #e0d8cc;
    --wash:    #22543d;
    --notwash: #744210;
    --red:     #c0392b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: var(--green);
    color: white;
    padding: 0 16px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--gold);
  }
  .header-sub { font-size: 11px; color: rgba(255,255,255,0.6); letter-spacing: 1px; text-transform: uppercase; }

  /* ── Nav tabs ── */
  .nav {
    background: white;
    display: flex;
    border-bottom: 2px solid var(--border);
    position: sticky;
    top: 56px;
    z-index: 99;
  }
  .nav-tab {
    flex: 1;
    padding: 12px 4px;
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--light);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
  }
  .nav-tab.active { color: var(--green); border-bottom-color: var(--green); }

  /* ── Views ── */
  .view { display: none; padding: 16px; max-width: 600px; margin: 0 auto; }
  .view.active { display: block; }

  /* ── Cards ── */
  .card {
    background: white;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    border: 1px solid var(--border);
  }
  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--green);
    margin-bottom: 12px;
  }

  /* ── Leaderboard ── */
  .team-score-block {
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 12px;
    color: white;
    position: relative;
    overflow: hidden;
  }
  .team-score-block.washington { background: linear-gradient(135deg, #2d6a4f, #40916c); }
  .team-score-block.notwashington { background: linear-gradient(135deg, #744210, #92400e); }
  .team-score-block::after {
    content: '';
    position: absolute;
    top: -20px; right: -20px;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
  }
  .team-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    opacity: 0.9;
  }
  .team-pts {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    line-height: 1;
    color: var(--gold);
  }
  .team-pts-label { font-size: 11px; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
  .day-breakdown { display: flex; gap: 16px; margin-top: 12px; }
  .day-chip {
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 600;
  }

  /* ── Player rows ── */
  .player-row {
    display: flex;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }
  .player-row:last-child { border-bottom: none; }
  .player-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-wash { background: var(--wash); }
  .dot-notwash { background: var(--notwash); }
  .player-name { flex: 1; font-size: 14px; font-weight: 500; }
  .player-pts-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--green);
    min-width: 32px;
    text-align: right;
  }
  .player-holes-played { font-size: 11px; color: var(--light); }

  /* ── Scorecard entry ── */
  .hole-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .hole-nav-btn {
    background: var(--green);
    color: white;
    border: none;
    border-radius: 8px;
    width: 40px; height: 40px;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .hole-nav-btn:disabled { background: var(--border); color: var(--light); cursor: not-allowed; }
  .hole-info {
    text-align: center;
  }
  .hole-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    color: var(--dark);
    line-height: 1;
  }
  .hole-meta { font-size: 12px; color: var(--light); margin-top: 2px; }
  .hole-meta strong { color: var(--green); }

  /* ── Score inputs ── */
  .score-entry-row {
    display: flex;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .score-entry-row:last-child { border-bottom: none; }
  .score-player-info { flex: 1; }
  .score-player-name { font-size: 15px; font-weight: 600; }
  .score-player-sub { font-size: 11px; color: var(--light); margin-top: 1px; }
  .score-input-wrap { display: flex; align-items: center; gap: 8px; }
  .score-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: white;
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--dark);
    font-weight: 300;
    transition: all 0.15s;
  }
  .score-btn:active { background: var(--green); color: white; border-color: var(--green); }
  .score-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    min-width: 36px;
    text-align: center;
    color: var(--dark);
  }
  .score-value.empty { color: var(--border); }
  .score-result {
    min-width: 60px;
    text-align: right;
  }
  .pts-badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .pts-5 { background: #7c3aed; color: white; }
  .pts-4 { background: #059669; color: white; }
  .pts-3 { background: #2d6a4f; color: white; }
  .pts-2 { background: #6b7280; color: white; }
  .pts-1 { background: #d97706; color: white; }
  .pts-0 { background: #fee2e2; color: #991b1b; }
  .pts-10 { background: var(--gold); color: var(--dark); }

  /* ── Submit button ── */
  .btn-primary {
    display: block;
    width: 100%;
    padding: 14px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    cursor: pointer;
    margin-top: 16px;
    transition: background 0.2s;
  }
  .btn-primary:active { background: var(--green2); }
  .btn-primary:disabled { background: var(--border); color: var(--light); }
  .btn-secondary {
    display: block;
    width: 100%;
    padding: 12px;
    background: white;
    color: var(--green);
    border: 2px solid var(--green);
    border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    cursor: pointer;
    margin-top: 8px;
  }

  /* ── Hole dots progress ── */
  .hole-dots {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .hole-dot {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--border);
    font-size: 9px;
    display: flex; align-items: center; justify-content: center;
    color: var(--light);
    cursor: pointer;
    font-weight: 600;
    transition: all 0.15s;
  }
  .hole-dot.scored { background: var(--green); color: white; }
  .hole-dot.current { background: var(--gold); color: var(--dark); }

  /* ── Admin ── */
  .day-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .day-btn {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: white;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .day-btn.active { border-color: var(--green); background: var(--green); color: white; }

  .tee-time-setup {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .tee-time-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    color: var(--green);
    margin-bottom: 10px;
  }
  .player-select-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .player-chip {
    padding: 8px 10px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: white;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-chip.selected { border-color: var(--green); background: #f0faf5; color: var(--green); font-weight: 600; }
  .player-chip.washington.selected { border-color: var(--wash); background: #f0faf5; }
  .player-chip.notwashington.selected { border-color: var(--notwash); background: #fef3e2; }
  .player-chip:disabled { opacity: 0.4; cursor: not-allowed; }

  .link-box {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 12px;
    color: var(--mid);
    font-family: monospace;
    word-break: break-all;
    cursor: pointer;
    margin-top: 10px;
  }
  .link-box:active { background: #e8f5ee; }
  .link-copied { color: var(--green); font-size: 11px; margin-top: 4px; display: none; }

  /* ── Scorecard view (read only) ── */
  .scorecard-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .scorecard-table th {
    background: var(--green);
    color: white;
    padding: 6px 4px;
    text-align: center;
    font-weight: 600;
  }
  .scorecard-table td {
    padding: 6px 4px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .scorecard-table tr:last-child td { border-bottom: none; }
  .scorecard-table .par-row td { background: #f9f9f9; font-weight: 600; font-size: 11px; color: var(--light); }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--dark);
    color: white;
    padding: 12px 20px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 500;
    z-index: 1000;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Misc ── */
  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--light);
    margin-bottom: 8px;
    margin-top: 16px;
  }
  .section-title:first-child { margin-top: 0; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--light); font-size: 14px; }
  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-center { display: flex; justify-content: center; padding: 40px; }

  .score-submitted-row {
    background: #f0faf5;
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 11px;
    color: var(--green2);
    font-weight: 600;
    text-align: center;
    margin-bottom: 2px;
  }

  .vs-divider {
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    color: var(--light);
    letter-spacing: 4px;
    margin: 4px 0;
  }

  .live-dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: #22c55e;
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header h1" style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:#d4a843;">GAMBLE SANDS 2025</div>
    <div class="header-sub" id="header-sub">Golf Trip Scorer</div>
  </div>
  <div id="live-indicator" style="display:none;font-size:12px;color:rgba(255,255,255,0.7);">
    <span class="live-dot"></span>LIVE
  </div>
</div>

<div class="nav">
  <div class="nav-tab active" onclick="showView('leaderboard')">🏆 Board</div>
  <div class="nav-tab" onclick="showView('score')" id="score-tab">⛳ Score</div>
  <div class="nav-tab" onclick="showView('cards')">📋 Cards</div>
  <div class="nav-tab" onclick="showView('admin')">⚙️ Setup</div>
</div>

<!-- LEADERBOARD VIEW -->
<div class="view active" id="view-leaderboard">
  <div id="leaderboard-content">
    <div class="loading-center"><div class="spinner"></div></div>
  </div>
</div>

<!-- SCORE ENTRY VIEW -->
<div class="view" id="view-score">
  <div id="score-content">
    <div class="card">
      <div style="text-align:center;padding:20px 0;">
        <div style="font-size:32px;margin-bottom:8px;">⛳</div>
        <div style="font-weight:600;margin-bottom:4px;">Score Entry</div>
        <div style="font-size:13px;color:var(--light);">Open your tee time link to enter scores</div>
      </div>
    </div>
    <div id="score-tee-times-list"></div>
  </div>
</div>

<!-- SCORECARDS VIEW -->
<div class="view" id="view-cards">
  <div id="cards-content">
    <div class="loading-center"><div class="spinner"></div></div>
  </div>
</div>

<!-- ADMIN VIEW -->
<div class="view" id="view-admin">
  <div id="admin-content">
    <div class="loading-center"><div class="spinner"></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const BASE = '';
let allPlayers = [];
let allCourses = [];
let currentView = 'leaderboard';
let scoringState = null; // { teeTime, currentHole, scores, day }
let adminDay = 1;
let teeTimes = { 1: [], 2: [] };
let eventSource = null;

// Check if we're on a scoring URL
const urlPath = window.location.pathname;
const scoreMatch = urlPath.match(/^\/score\/([a-f0-9]+)$/);

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  await Promise.all([loadPlayers(), loadCourses()]);

  if (scoreMatch) {
    // Direct scoring link
    showView('score');
    await loadScoringView(scoreMatch[1]);
  } else {
    loadLeaderboard();
    loadAdminView();
    loadTeeTimes();
    connectSSE();
  }
}

function connectSSE() {
  eventSource = new EventSource('/api/events');
  eventSource.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'score_update') {
      renderLeaderboard(data.leaderboard);
      document.getElementById('live-indicator').style.display = 'flex';
    }
  };
}

async function loadPlayers() {
  const res = await fetch('/api/players');
  allPlayers = await res.json();
}

async function loadCourses() {
  const res = await fetch('/api/courses');
  allCourses = await res.json();
}

// ─── Views ────────────────────────────────────────────────────────────────────
function showView(name) {
  currentView = name;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  const tabs = ['leaderboard','score','cards','admin'];
  const idx = tabs.indexOf(name);
  if (idx >= 0) document.querySelectorAll('.nav-tab')[idx].classList.add('active');

  if (name === 'leaderboard') loadLeaderboard();
  if (name === 'cards') loadCards();
  if (name === 'admin') loadAdminView();
  if (name === 'score') loadScoreViewList();
}

// ─── Leaderboard ──────────────────────────────────────────────────────────────
async function loadLeaderboard() {
  try {
    const res = await fetch('/api/leaderboard');
    const data = await res.json();
    renderLeaderboard(data);
  } catch (e) {
    document.getElementById('leaderboard-content').innerHTML = '<div class="empty-state">Could not load leaderboard</div>';
  }
}

function renderLeaderboard(teams) {
  if (!teams || !teams.length) {
    document.getElementById('leaderboard-content').innerHTML = '<div class="empty-state">No scores yet</div>';
    return;
  }

  const sorted = [...teams].sort((a,b) => b.total_points - a.total_points);

  let html = '';

  // Big team scores
  sorted.forEach((team, i) => {
    const cls = team.team_name.includes('Not') ? 'notwashington' : 'washington';
    html += `
      <div class="team-score-block ${cls}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div>
            <div class="team-name">${team.team_name}</div>
            <div class="team-pts">${team.total_points}</div>
            <div class="team-pts-label">Total Stableford Points</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:11px;opacity:0.7;text-transform:uppercase;letter-spacing:1px;">Day 1</div>
            <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold);">${team.day1_points}</div>
            <div style="font-size:11px;opacity:0.7;text-transform:uppercase;letter-spacing:1px;margin-top:4px;">Day 2</div>
            <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold);">${team.day2_points}</div>
          </div>
        </div>
      </div>
    `;
  });

  if (sorted.length === 2) {
    const diff = Math.abs(sorted[0].total_points - sorted[1].total_points);
    html += `<div class="vs-divider">${sorted[0].total_points} — ${sorted[1].total_points}</div>`;
  }

  // Players per team
  sorted.forEach(team => {
    const cls = team.team_name.includes('Not') ? 'notwashington' : 'washington';
    const dotCls = team.team_name.includes('Not') ? 'dot-notwash' : 'dot-wash';
    const playersSorted = [...team.players].sort((a,b) => b.total_points - a.total_points);

    html += `<div class="section-title">${team.team_name}</div><div class="card" style="padding:8px 16px;">`;
    playersSorted.forEach(p => {
      const holesD1 = p.holes.filter(h => h.day === 1).length;
      const holesD2 = p.holes.filter(h => h.day === 2).length;
      let holeTxt = '';
      if (holesD1 > 0) holeTxt += `D1: ${holesD1}h`;
      if (holesD2 > 0) holeTxt += (holeTxt ? ' · ' : '') + `D2: ${holesD2}h`;
      if (!holeTxt) holeTxt = 'No scores yet';

      html += `
        <div class="player-row">
          <div class="player-dot ${dotCls}"></div>
          <div class="player-name">${p.player_name}</div>
          <div>
            <div class="player-holes-played">${holeTxt}</div>
          </div>
          <div class="player-pts-badge">${p.total_points}</div>
        </div>
      `;
    });
    html += '</div>';
  });

  document.getElementById('leaderboard-content').innerHTML = html;
}

// ─── Score entry list (for /score tab without a token) ────────────────────────
async function loadScoreViewList() {
  if (scoreMatch) return;
  const el = document.getElementById('score-tee-times-list');
  el.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';

  try {
    let html = '';
    for (const day of [1, 2]) {
      const res = await fetch(`/api/tee-times/${day}`);
      const tts = await res.json();
      if (tts.length) {
        const course = allCourses.find(c => c.day === day);
        html += `<div class="section-title">Day ${day} — ${course ? course.name : ''}</div>`;
        tts.forEach(tt => {
          const playerNames = tt.players.map(p => p.name.split(' ')[0]).join(', ') || 'Not set up yet';
          html += `
            <div class="card" style="cursor:pointer;" onclick="openScoringLink('${tt.unique_token}')">
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <div>
                  <div style="font-weight:600;">${tt.label}</div>
                  <div style="font-size:12px;color:var(--light);margin-top:2px;">${playerNames}</div>
                </div>
                <div style="color:var(--green);font-size:20px;">→</div>
              </div>
            </div>
          `;
        });
      }
    }
    if (!html) html = '<div class="empty-state">No tee times set up yet.<br>Go to Setup to create them.</div>';
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = '<div class="empty-state">Could not load tee times</div>';
  }
}

function openScoringLink(token) {
  window.location.href = `/score/${token}`;
}

async function loadTeeTimes() {
  for (const day of [1, 2]) {
    const res = await fetch(`/api/tee-times/${day}`);
    teeTimes[day] = await res.json();
  }
}

// ─── Scoring view (via token) ─────────────────────────────────────────────────
async function loadScoringView(token) {
  document.getElementById('score-content').innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';

  try {
    const res = await fetch(`/api/tee-time/${token}`);
    if (!res.ok) {
      document.getElementById('score-content').innerHTML = '<div class="card"><div class="empty-state">Tee time not found.<br>Check your link.</div></div>';
      return;
    }
    const tt = await res.json();
    scoringState = {
      teeTime: tt,
      currentHole: 1,
      day: tt.day,
      scores: {}, // { playerId: { holeNumber: { gross, points } } }
      token
    };

    // Pre-fill existing scores
    if (tt.scores) {
      tt.scores.forEach(s => {
        if (!scoringState.scores[s.player_id]) scoringState.scores[s.player_id] = {};
        scoringState.scores[s.player_id][s.hole_number] = {
          gross: s.gross_strokes,
          points: s.stableford_points
        };
      });
    }

    const course = tt.course;
    document.getElementById('header-sub').textContent = `${tt.label} — ${course.name}`;
    document.getElementById('live-indicator').style.display = 'flex';

    renderScoringView();
  } catch (e) {
    document.getElementById('score-content').innerHTML = '<div class="card"><div class="empty-state">Error loading tee time</div></div>';
  }
}

function renderScoringView() {
  const { teeTime, currentHole, day, scores } = scoringState;
  const course = teeTime.course;
  const holes = course.holes;
  const hole = holes.find(h => h.hole_number === currentHole);

  // Compute scored holes per player
  const allScored = (hNum) => teeTime.players.every(p => scores[p.id] && scores[p.id][hNum] !== undefined);

  // Build hole dots
  let dotsHtml = '<div class="hole-dots">';
  holes.forEach(h => {
    const done = allScored(h.hole_number);
    const cur = h.hole_number === currentHole;
    dotsHtml += `<div class="hole-dot ${done?'scored':''} ${cur?'current':''}" onclick="goToHole(${h.hole_number})">${h.hole_number}</div>`;
  });
  dotsHtml += '</div>';

  // Player score rows
  let playerRows = '';
  teeTime.players.forEach(p => {
    const playerStrokes = day === 1 ? p.strokes_day1 : p.strokes_day2;
    const strokesOnHole = calcStrokesOnHole(playerStrokes, hole.stroke_index);
    const existing = scores[p.id] && scores[p.id][currentHole];
    const gross = existing ? existing.gross : null;
    const pts = gross !== null ? calcStablefordClient(gross, hole.par, strokesOnHole) : null;

    const teamColor = p.team_name.includes('Not') ? 'var(--notwash)' : 'var(--wash)';
    const ptsHtml = pts !== null ? `<span class="pts-badge pts-${pts}">${pts}</span>` : '';

    playerRows += `
      <div class="score-entry-row">
        <div class="score-player-info">
          <div class="score-player-name" style="color:${teamColor}">${p.name.split(' ')[0]}</div>
          <div class="score-player-sub">${playerStrokes} strokes given · +${strokesOnHole} this hole</div>
        </div>
        <div class="score-result">${ptsHtml}</div>
        <div class="score-input-wrap">
          <button class="score-btn" onclick="adjustScore(${p.id}, -1)">−</button>
          <div class="score-value ${gross===null?'empty':''}" id="sv-${p.id}">${gross !== null ? gross : '—'}</div>
          <button class="score-btn" onclick="adjustScore(${p.id}, 1)">+</button>
        </div>
      </div>
    `;
  });

  const prevDisabled = currentHole <= 1 ? 'disabled' : '';
  const nextDisabled = currentHole >= 18 ? 'disabled' : '';

  document.getElementById('score-content').innerHTML = `
    ${dotsHtml}
    <div class="card">
      <div class="hole-nav">
        <button class="hole-nav-btn" onclick="goToHole(${currentHole-1})" ${prevDisabled}>‹</button>
        <div class="hole-info">
          <div class="hole-number">HOLE ${currentHole}</div>
          <div class="hole-meta">Par <strong>${hole.par}</strong> · Stroke Index <strong>${hole.stroke_index}</strong></div>
        </div>
        <button class="hole-nav-btn" onclick="goToHole(${currentHole+1})" ${nextDisabled}>›</button>
      </div>
      ${playerRows}
      <button class="btn-primary" onclick="submitHole()">SAVE HOLE ${currentHole}</button>
      ${currentHole < 18 ? `<button class="btn-secondary" onclick="submitAndNext()">SAVE & NEXT HOLE →</button>` : ''}
    </div>
  `;
}

function calcStrokesOnHole(totalStrokes, strokeIndex) {
  let strokes = 0;
  if (totalStrokes >= strokeIndex) strokes = 1;
  const extra = totalStrokes - 18;
  if (extra > 0 && strokeIndex <= extra) strokes = 2;
  return strokes;
}

function calcStablefordClient(gross, par, strokesReceived) {
  if (gross === 1) return 10;
  const net = gross - strokesReceived;
  const diff = net - par;
  if (diff <= -3) return 5;
  if (diff === -2) return 4;
  if (diff === -1) return 3;
  if (diff === 0)  return 2;
  if (diff === 1)  return 1;
  return 0;
}

function adjustScore(playerId, delta) {
  const { teeTime, currentHole, day, scores } = scoringState;
  const course = teeTime.course;
  const hole = course.holes.find(h => h.hole_number === currentHole);
  const player = teeTime.players.find(p => p.id === playerId);
  const playerStrokes = day === 1 ? player.strokes_day1 : player.strokes_day2;
  const strokesOnHole = calcStrokesOnHole(playerStrokes, hole.stroke_index);

  if (!scores[playerId]) scores[playerId] = {};
  const current = scores[playerId][currentHole];
  let newGross = current ? current.gross + delta : hole.par + delta;
  newGross = Math.max(1, newGross);

  scores[playerId][currentHole] = {
    gross: newGross,
    points: calcStablefordClient(newGross, hole.par, strokesOnHole)
  };

  // Update just this player's UI without full re-render
  const el = document.getElementById(`sv-${playerId}`);
  if (el) {
    el.textContent = newGross;
    el.classList.remove('empty');
  }
  // Re-render to update points badge
  renderScoringView();
}

function goToHole(num) {
  if (num < 1 || num > 18) return;
  scoringState.currentHole = num;
  renderScoringView();
}

async function submitHole() {
  await doSubmit();
}

async function submitAndNext() {
  await doSubmit();
  if (scoringState.currentHole < 18) {
    scoringState.currentHole++;
    renderScoringView();
  }
}

async function doSubmit() {
  const { teeTime, currentHole, day, scores } = scoringState;
  const course = teeTime.course;
  const hole = course.holes.find(h => h.hole_number === currentHole);

  const entries = teeTime.players
    .filter(p => scores[p.id] && scores[p.id][currentHole] !== undefined)
    .map(p => ({
      player_id: p.id,
      gross_strokes: scores[p.id][currentHole].gross
    }));

  if (!entries.length) { showToast('Enter at least one score'); return; }

  try {
    const res = await fetch('/api/scores', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ day, hole_id: hole.id, entries })
    });
    if (res.ok) showToast(`Hole ${currentHole} saved ✓`);
    else showToast('Error saving scores');
  } catch(e) {
    showToast('Error saving scores');
  }
}

// ─── Scorecards (read-only) ───────────────────────────────────────────────────
async function loadCards() {
  const el = document.getElementById('cards-content');
  el.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';

  try {
    let html = '';
    for (const day of [1,2]) {
      const lbRes = await fetch(`/api/leaderboard/${day}`);
      const lb = await lbRes.json();
      const course = allCourses.find(c => c.day === day);
      if (!course) continue;

      html += `<div class="section-title">Day ${day} — ${course.name}</div>`;

      lb.forEach(team => {
        const playersSorted = [...team.players].sort((a,b) => b.total_points - a.total_points);
        playersSorted.forEach(p => {
          const dayHoles = p.holes.filter(h => h.day === day);
          if (!dayHoles.length) return;

          html += `<div class="card" style="padding:12px;">`;
          html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <div style="font-weight:600;font-size:14px;">${p.player_name}</div>
            <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--green);">${p.total_points} pts</div>
          </div>`;

          html += `<table class="scorecard-table"><thead><tr>`;
          for (let i = 1; i <= 18; i++) html += `<th>${i}</th>`;
          html += `<th>TOT</th></tr></thead><tbody>`;

          // Gross row
          html += `<tr>`;
          for (let i = 1; i <= 18; i++) {
            const h = dayHoles.find(x => x.hole_number === i);
            html += `<td>${h ? h.gross : '—'}</td>`;
          }
          html += `<td><strong>${dayHoles.reduce((s,h)=>s+h.gross,0)||'—'}</strong></td></tr>`;

          // Points row
          html += `<tr>`;
          for (let i = 1; i <= 18; i++) {
            const h = dayHoles.find(x => x.hole_number === i);
            const pts = h ? h.points : null;
            const badge = pts !== null ? `<span class="pts-badge pts-${pts}" style="font-size:10px;">${pts}</span>` : '—';
            html += `<td>${badge}</td>`;
          }
          html += `<td><strong>${p.total_points}</strong></td></tr>`;

          html += `</tbody></table></div>`;
        });
      });
    }

    if (!html) html = '<div class="empty-state">No scores entered yet</div>';
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = '<div class="empty-state">Could not load scorecards</div>';
  }
}

// ─── Admin / Setup ────────────────────────────────────────────────────────────
async function loadAdminView() {
  const el = document.getElementById('admin-content');

  // Build player availability map (already assigned?)
  let html = `
    <div class="section-title">Select Day</div>
    <div class="day-toggle">
      <div class="day-btn ${adminDay===1?'active':''}" onclick="setAdminDay(1)">Day 1 — Scarecrow</div>
      <div class="day-btn ${adminDay===2?'active':''}" onclick="setAdminDay(2)">Day 2 — Gamble Sands</div>
    </div>
  `;

  try {
    const res = await fetch(`/api/tee-times/${adminDay}`);
    teeTimes[adminDay] = await res.json();
  } catch(e) {}

  const assignedPlayerIds = new Set();
  teeTimes[adminDay].forEach(tt => tt.players.forEach(p => assignedPlayerIds.add(p.id)));

  // If no tee times for this day yet, show create button
  if (!teeTimes[adminDay].length) {
    html += `
      <div class="card" style="text-align:center;">
        <div style="padding:12px 0;font-size:14px;color:var(--light);margin-bottom:12px;">No tee times created for Day ${adminDay} yet</div>
        <button class="btn-primary" onclick="createTeeTimes(${adminDay})">CREATE 4 TEE TIMES</button>
      </div>
    `;
  } else {
    // Player pool sorted by team
    const washington = allPlayers.filter(p => p.team_name === 'Team Washington');
    const notWashington = allPlayers.filter(p => p.team_name === 'Team Not Washington');

    teeTimes[adminDay].forEach((tt, idx) => {
      const selectedIds = new Set(tt.players.map(p => p.id));

      html += `
        <div class="tee-time-setup" id="tt-block-${tt.id}">
          <div class="tee-time-label">${tt.label} (${selectedIds.size}/4 players)</div>
          <div class="section-title" style="margin-top:0;">Team Washington</div>
          <div class="player-select-grid">
            ${washington.map(p => {
              const isSelected = selectedIds.has(p.id);
              const isDisabled = !isSelected && assignedPlayerIds.has(p.id);
              return `<button class="player-chip washington ${isSelected?'selected':''}"
                ${isDisabled?'disabled':''}
                onclick="togglePlayer(${tt.id}, ${p.id})">${p.name}</button>`;
            }).join('')}
          </div>
          <div class="section-title">Team Not Washington</div>
          <div class="player-select-grid">
            ${notWashington.map(p => {
              const isSelected = selectedIds.has(p.id);
              const isDisabled = !isSelected && assignedPlayerIds.has(p.id);
              return `<button class="player-chip notwashington ${isSelected?'selected':''}"
                ${isDisabled?'disabled':''}
                onclick="togglePlayer(${tt.id}, ${p.id})">${p.name}</button>`;
            }).join('')}
          </div>
          <div class="link-box" onclick="copyLink('${tt.unique_token}')" id="link-${tt.id}">
            📋 ${window.location.origin}/score/${tt.unique_token}
          </div>
          <div class="link-copied" id="copied-${tt.id}">Copied to clipboard!</div>
        </div>
      `;
    });

    html += `<button class="btn-secondary" style="margin-top:8px;" onclick="createTeeTimes(${adminDay})">↺ Reset Tee Times</button>`;
  }

  el.innerHTML = html;
}

function setAdminDay(day) {
  adminDay = day;
  loadAdminView();
}

async function createTeeTimes(day) {
  const res = await fetch('/api/tee-times', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ day })
  });
  teeTimes[day] = await res.json();
  loadAdminView();
  showToast('4 tee times created');
}

async function togglePlayer(ttId, playerId) {
  const tt = teeTimes[adminDay].find(t => t.id === ttId);
  if (!tt) return;

  const selectedIds = new Set(tt.players.map(p => p.id));

  if (selectedIds.has(playerId)) {
    selectedIds.delete(playerId);
  } else {
    if (selectedIds.size >= 4) { showToast('Max 4 players per tee time'); return; }
    selectedIds.add(playerId);
  }

  await fetch(`/api/tee-times/${ttId}/players`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ player_ids: [...selectedIds] })
  });

  // Reload
  const res = await fetch(`/api/tee-times/${adminDay}`);
  teeTimes[adminDay] = await res.json();
  loadAdminView();
}

function copyLink(token) {
  const url = `${window.location.origin}/score/${token}`;
  navigator.clipboard.writeText(url).then(() => {
    showToast('Link copied!');
  });
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── Start ────────────────────────────────────────────────────────────────────
init();
</script>
